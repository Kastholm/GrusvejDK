# example netlify.toml
[build]
  # Use Nuxt's SSR build so Nitro can produce Netlify Functions for /api routes
  # `npm run build` runs `nuxt build` (see package.json). The Nitro Netlify preset
  # will output functions to `.netlify/functions` and the public site to `.output/public`.
  command = "npm run build"
  # Nitro (Netlify preset) produces functions under `.netlify/functions-internal`.
  # Point Netlify to that folder so the generated server function is picked up.
  functions = ".netlify/functions-internal"
  publish = ".output/public"

  ## Uncomment to use this redirect for Single Page Applications like create-react-app.
  ## Not needed for static site generators.
  #[[redirects]]
  #  from = "/*"
  #  to = "/index.html"
  #  status = 200

  ## (optional) Settings for Netlify Dev
  ## https://github.com/netlify/cli/blob/main/docs/netlify-dev.md#project-detection
  #[dev]
  #  command = "yarn start" # Command to start your dev server
  #  port = 3000 # Port that the dev server will be listening on
  #  publish = "dist" # Folder with the static content for _redirect file

  ## more info on configuring this file: https://ntl.fyi/file-based-build-config

[build.environment]
# Ensure a recent Node version on Netlify (Nuxt 4 / Nitro require Node 18+)
NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server?path=/:splat"
  status = 200
  force = true